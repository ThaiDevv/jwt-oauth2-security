server.port=4002
spring.application.name=server-vulnerable

# ─── H2 Database ───────────────────────────────────
spring.datasource.url=jdbc:h2:mem:vulndb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# ─── Thymeleaf ──────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ─── Session ────────────────────────────────────────
# Giữ session để lưu state OAuth2 (mặc dù server này KHÔNG dùng state)
spring.session.store-type=none
server.servlet.session.timeout=30m

# ─── Logging ────────────────────────────────────────
logging.level.com.attt=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# ─── Google OAuth2 ──────────────────────────────────
google.client-id=453844118071-688vj1koun99isl0k929v70pekaclo85.apps.googleusercontent.com
google.client-secret=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

# ─── CORS ───────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
