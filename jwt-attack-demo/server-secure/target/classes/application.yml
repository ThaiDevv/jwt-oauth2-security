server:
  port: 4001
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: server-secure

  # ── H2 Database ──────────────────────────────────
  datasource:
    url: jdbc:h2:mem:securedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: false

  # ── Thymeleaf ─────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  # ── Session ───────────────────────────────────────
  # IF_REQUIRED: Tạo session khi cần (cho OAuth2 state lưu server-side)
  session:
    store-type: none

# ── Logging ─────────────────────────────────────────
logging:
  level:
    com.attt: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

# ── CORS ────────────────────────────────────────────
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001

