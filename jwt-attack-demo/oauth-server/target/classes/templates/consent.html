<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Authorization Request — OAuth2 Demo Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f0f2f5; min-height: 100vh; display: flex;
           align-items: center; justify-content: center; }
    .card { background: white; border-radius: 12px; padding: 32px;
            max-width: 440px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .logo  { text-align: center; font-size: 40px; margin-bottom: 8px; }
    h2     { text-align: center; color: #1a1a2e; margin-bottom: 24px; font-size: 20px; }
    .field { margin-bottom: 12px; }
    .label { font-size: 12px; color: #666; font-weight: 600; text-transform: uppercase; }
    .value { font-size: 14px; color: #222; margin-top: 2px; }
    .value code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px;
                  font-family: monospace; font-size: 12px; word-break: break-all; }
    .scope-badge { display: inline-block; background: #e8f4fd; color: #1976d2;
                   border-radius: 20px; padding: 3px 10px; font-size: 12px;
                   font-weight: 600; margin-right: 4px; }
    .warning { background: #fff8e1; border-left: 4px solid #f59e0b;
               padding: 12px 16px; border-radius: 4px; margin: 20px 0;
               font-size: 13px; color: #92400e; }
    .warning strong { display: block; margin-bottom: 4px; }
    .actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 8px;
           cursor: pointer; font-size: 15px; font-weight: 600; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-allow { background: #22c55e; color: white; }
    .btn-deny  { background: #ef4444; color: white; }
    .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔐</div>
    <h2>Authorization Request</h2>

    <div class="field">
      <div class="label">Application</div>
      <div class="value"><strong th:text="${clientId}">client-app</strong></div>
    </div>

    <div class="field">
      <div class="label">Requested Permissions</div>
      <div class="value" th:with="scopes=${scope.split(' ')}">
        <span class="scope-badge" th:each="s : ${scopes}" th:text="${s}">scope</span>
      </div>
    </div>

    <div class="field">
      <div class="label">Redirect URI (sau khi xác nhận)</div>
      <div class="value"><code th:text="${redirectUri}">http://...</code></div>
    </div>

    <hr class="divider">

    <div class="warning">
      <strong>⚠️ Demo Server — Lỗ hổng OAuth2</strong>
      redirect_uri KHÔNG được validate — có thể bị attacker thay bằng URL giả mạo để chặn authorization code!
    </div>

    <form th:action="@{/authorize}" method="post">
      <input type="hidden" name="redirect_uri" th:value="${redirectUri}"/>
      <input type="hidden" name="client_id"    th:value="${clientId}"/>
      <input type="hidden" name="state"        th:value="${state}"/>
      <div class="actions">
        <button type="submit" class="btn btn-allow">✅ Allow</button>
        <button type="button" class="btn btn-deny"
                onclick="window.close()">❌ Deny</button>
      </div>
    </form>
  </div>
</body>
</html>
