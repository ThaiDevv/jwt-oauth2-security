server:
  port: 8080

spring:
  application:
    name: api-server-secure
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/security_db?allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:dev_user}
    password: ${SPRING_DATASOURCE_PASSWORD:dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:supersecretkeythatisatleast256bitslongtoavoiderrorsinspringsecurityjwt}
    expiration-ms: 900000 # 15 mins
  security:
    mode: ${SECURITY_MODE:secure}
