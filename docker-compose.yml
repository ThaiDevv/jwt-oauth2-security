services:

  mysql-db:
    image: mariadb:10.11
    container_name: security-mysql-db

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-security_db}
      MYSQL_USER: ${MYSQL_USER:-dev_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-dev_user}", "-p${MYSQL_PASSWORD:-dev_password}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secure-api-server
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE:-security_db}?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-dev_user}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-dev_password}
      - JWT_SECRET=${JWT_SECRET}
      - SECURITY_MODE=secure
    depends_on:
      mysql-db:
        condition: service_healthy

  hacker-server:
    build:
      context: ./attacks/hacker-server
      dockerfile: Dockerfile
    container_name: hacker-server
    ports:
      - "${HACKER_PORT:-4000}:4000"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: security-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api-server

volumes:
  mysql_data:
